name: CI Build and Test

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '12'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: node dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Create tarball
        run: npm pack

      - name: Upload updated code as artifact
        uses: actions/upload-artifact@v4
        with:
          name: updated-code
          path: .


  security-scan:
    runs-on: ubuntu-latest
    needs: build  
    steps:

      - name: Download updated code artifact
        uses: actions/download-artifact@v4
        with:
          name: updated-code
          path: updated

      - name: Move artifact contents to root
        run: |
          cp -r updated/* .

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '12'
     
      - name: Set up Git user identity
        run: |
          git config --global user.email "41227409+shruthi1798@users.noreply.github.com"
          git config --global user.name "shruthi1798"     

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk test
        run: snyk test  

      - name: Pack package
        run: npm pack


  publish:
    runs-on: ubuntu-latest

    needs: security-scan

    steps:
      - name: Download updated code artifact
        uses: actions/download-artifact@v4
        with:
          name: updated-code
          path: updated

      - name: Move artifact contents to root
        run: |
          cp -r updated/* .

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '12'

      - name: Configure .npmrc for JFrog
        run: |
           echo "//veednainc.jfrog.io/artifactory/github-build-npm/:_authToken=${{ secrets.JFROG_PASSWORD}}" >> ~/.npmrc
           echo "registry=${{ secrets.JFROG_URL }}" >> ~/.npmrc

      - name: Publish package to JFrog
        run: npm publish taffydb-2.7.3.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.JFROG_PASSWORD}}